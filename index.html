<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相遇问题模拟</title>
</head>
<body style="margin: 0; padding: 0; display: flex; justify-content: center;">
    
    </body>
</html>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1050" style="background-color: #f8fafc; font-family: 'PingFang SC', sans-serif;">
  <style>
    .panel { fill: #ffffff; rx: 12; stroke: #e2e8f0; stroke-width: 2; }
    .track { stroke: #cbd5e1; stroke-width: 4; stroke-dasharray: 6 6; }
    .entity-label { font-size: 12px; font-weight: bold; fill: #fff; text-anchor: middle; pointer-events: none;}
    input { width: 100px; padding: 6px; font-size: 16px; border: 2px solid #3b82f6; border-radius: 6px; text-align: center; }
    button { padding: 8px 16px; font-size: 16px; font-weight: bold; color: white; background-color: #3b82f6; border: none; border-radius: 6px; cursor: pointer; }
    .flag { font-size: 24px; }
  </style>

  <text x="400" y="40" font-size="22" font-weight="bold" fill="#1e293b" text-anchor="middle">🐕 逻辑实验室：超量冲刺与提前冻结</text>
  <text x="400" y="70" font-size="14" fill="#64748b" text-anchor="middle">少于1600: 全员提前冻结 | 多于1600: 狗冲出重围</text>

  <rect x="50" y="100" width="700" height="290" class="panel" stroke="#cbd5e1" />
  
  <text x="70" y="135" font-size="15" font-weight="bold" fill="#0f172a">【题目背景】</text>
  <text x="70" y="165" font-size="14" fill="#334155">在美丽的青青草原上，有两条笔直的小路。小明和小红分别站在路的两端 A 点和 B 点，</text>
  <text x="70" y="195" font-size="14" fill="#334155">他们之间相距 <tspan font-weight="bold">2000米</tspan>。</text>
  <text x="70" y="225" font-size="14" fill="#334155">小明（蓝衣）的速度是 <tspan font-weight="bold">60米/分钟</tspan>；小红（粉衣）的速度是 <tspan font-weight="bold">40米/分钟</tspan>。</text>
  <text x="70" y="255" font-size="14" fill="#334155">他们同时出发，面对面走来。</text>
  <text x="70" y="285" font-size="14" fill="#334155">小明带了一只顽皮的金毛犬，它的速度很快，是 <tspan font-weight="bold">80米/分钟</tspan>。</text>

  <text x="70" y="325" font-size="15" font-weight="bold" fill="#0f172a">【核心任务】</text>
  <text x="70" y="355" font-size="14" fill="#334155">小明出发的一瞬间，小狗也跟着跑了出来。它只要一碰到小红，就立刻掉头往小明跑；</text>
  <text x="70" y="385" font-size="14" fill="#334155">一碰到小明，又立刻掉头往小红跑。</text>
  <text x="70" y="415" font-size="14" font-weight="bold" fill="#ef4444">请问：当小明和小红手拉手相遇的那一刻，这只顽皮的小狗一共跑了多少米？</text>

  <rect x="50" y="440" width="700" height="80" class="panel" stroke="#3b82f6" />
  <foreignObject x="180" y="455" width="440" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: center; justify-content: center; gap: 15px; height: 100%;">
      <span style="font-weight: bold; color: #1e293b;">预测路程：</span>
      <input type="number" id="predictInput" value="100" />
      <span style="font-weight: bold; color: #1e293b;">米</span>
      <button onclick="handleStart()">开始测试</button>
    </div>
  </foreignObject>

  <rect x="50" y="540" width="700" height="200" fill="#f1f5f9" rx="12"/>
  <line x1="100" y1="660" x2="700" y2="660" class="track" />
  <g id="finish-flag" transform="translate(460, 610)" opacity="0.4">
    <text class="flag">🏁</text>
    <text y="65" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">正确相遇点</text>
  </g>

  <circle id="ming" cx="100" cy="660" r="22" fill="#3b82f6" opacity="0.7" />
  <text id="ming-t" x="100" y="665" class="entity-label">小明</text>
  <circle id="hong" cx="700" cy="660" r="22" fill="#ec4899" opacity="0.7" />
  <text id="hong-t" x="700" y="665" class="entity-label">小红</text>
  <g id="dog-box">
    <circle id="dog" cx="100" cy="625" r="16" fill="#f59e0b" stroke="#fff" stroke-width="2" />
    <text id="dog-t" x="100" y="630" class="entity-label" font-size="10">狗</text>
  </g>

  <rect x="50" y="760" width="700" height="150" class="panel" />
  <text id="v-time" x="150" y="860" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">0.0</text>
  <text x="150" y="810" font-size="14" fill="#64748b" text-anchor="middle">⏱️ 消耗时间(分)</text>
  <text id="v-dog" x="400" y="860" font-size="32" font-weight="bold" fill="#f59e0b" text-anchor="middle">0.0</text>
  <text x="400" y="810" font-size="14" fill="#64748b" text-anchor="middle">🐕 狗跑的路程(米)</text>
  <text id="v-status" x="650" y="860" font-size="20" font-weight="bold" fill="#3b82f6" text-anchor="middle">准备就绪</text>
  <text x="650" y="810" font-size="14" fill="#64748b" text-anchor="middle">📊 当前状态</text>

  <rect id="res-box" x="50" y="930" width="700" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" />
  <text id="res-text" x="400" y="975" font-size="18" font-weight="bold" text-anchor="middle" fill="#475569">等待测试结果...</text>

  <script><![CDATA[
    let animId = null;
    let s = { time: 0, dDist: 0, pred: 0, dDir: 1, dX: 0, finished: false };
    const SCALE = 600 / 2000;

    function handleStart() {
      const val = parseFloat(document.getElementById('predictInput').value);
      if (isNaN(val) || val <= 0) return;
      if (animId) cancelAnimationFrame(animId);

      s = { time: 0, dDist: 0, pred: val, dDir: 1, dX: 0, finished: false };
      document.getElementById('res-text').textContent = "正在同步模拟中...";
      document.getElementById('res-box').style.fill = "#f8fafc";
      
      tick();
    }

    function tick() {
      const dt = 0.05;
      
      const humansMet = s.time >= 20;
      const dogDone = s.dDist >= s.pred;

      if (dogDone) {
        render();
        showFeedback(humansMet);
        return;
      }

      if (!humansMet) {
        s.time += dt;
      }

      let dogStep = 80 * dt;
      if (s.dDist + dogStep > s.pred) dogStep = s.pred - s.dDist;
      s.dDist += dogStep;

      if (!humansMet) {
        s.dX += s.dDir * dogStep;
        let mX = 60 * s.time;
        let hX = 2000 - (40 * s.time);
        if (s.dDir === 1 && s.dX >= hX) { s.dX = hX; s.dDir = -1; }
        else if (s.dDir === -1 && s.dX <= mX) { s.dX = mX; s.dDir = 1; }
        document.getElementById('v-status').textContent = "折返跑中";
        document.getElementById('v-status').style.fill = "#3b82f6";
      } else {
        s.dX += s.dDir * dogStep;
        document.getElementById('v-status').textContent = "超量冲刺";
        document.getElementById('v-status').style.fill = "#ef4444";
      }

      render();
      animId = requestAnimationFrame(tick);
    }

    function render() {
      const mR = Math.min(60 * s.time, 1200);
      const hR = 2000 - Math.min(40 * s.time, 800);
      
      document.getElementById('ming').setAttribute('cx', 100 + mR * SCALE);
      document.getElementById('ming-t').setAttribute('x', 100 + mR * SCALE);
      document.getElementById('hong').setAttribute('cx', 100 + hR * SCALE);
      document.getElementById('hong-t').setAttribute('x', 100 + hR * SCALE);
      document.getElementById('dog').setAttribute('cx', 100 + s.dX * SCALE);
      document.getElementById('dog-t').setAttribute('x', 100 + s.dX * SCALE);

      document.getElementById('v-time').textContent = s.time.toFixed(1);
      document.getElementById('v-dog').textContent = s.dDist.toFixed(1);
    }

    function showFeedback(hM) {
      const resT = document.getElementById('res-text');
      const resB = document.getElementById('res-box');
      const diff = s.pred - 1600;

      if (Math.abs(diff) < 1) {
        resT.textContent = "🎯 完美结论！狗跑完预测值时，主人刚好相遇停下。";
        resB.style.fill = "#f0fdf4";
        document.getElementById('v-status').textContent = "完美相遇";
      } else if (diff < 0) {
        resT.textContent = "❌ 预测过小：狗已停下，但主人中间还有缺口。";
        resB.style.fill = "#fef2f2";
        document.getElementById('v-status').textContent = "提前终止";
      } else {
        resT.textContent = "❌ 预测过大：主人在旗帜处相遇后，狗又多跑了 " + diff.toFixed(0) + " 米才停下。";
        resB.style.fill = "#fff7ed";
        document.getElementById('v-status').textContent = "冲过头了";
      }
    }
  ]]></script>
</svg>
