<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MC方块大陆：数学传送门</title>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f1f5f9; 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            color: #0f172a;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        /* 顶部导航头：加入了苦力怕绿和红石色调 */
        .header {
            width: 100%;
            background: #274e13;
            background-image: linear-gradient(45deg, #1b380b 25%, #274e13 25%, #274e13 50%, #1b380b 50%, #1b380b 75%, #274e13 75%, #274e13 100%);
            background-size: 20px 20px;
            color: #a8e6cf;
            padding: 40px 20px;
            text-align: center;
            box-sizing: border-box;
            box-shadow: 0 6px 0px #1b380b;
        }
        .header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 2px 2px 0 #000;
        }
        .header p {
            margin: 10px 0 0 0;
            color: #ffaa00;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .card {
            background: white;
            border-radius: 8px; /* MC风格稍微方正一点 */
            padding: 30px 25px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
            border: 2px solid #cbd5e1;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 0px rgba(0,0,0,0.15);
            border-color: #22c55e;
        }
        .card:hover .btn {
            background: #22c55e;
            color: white;
            box-shadow: 0 4px 0 #166534;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 15px;
            line-height: 1;
        }
        .title {
            font-size: 1.25rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #1e293b;
        }
        .desc {
            font-size: 0.95rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 25px;
            flex-grow: 1;
        }

        /* 传送门按钮 */
        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #e2e8f0;
            color: #475569;
            font-weight: bold;
            border-radius: 4px;
            transition: 0.1s;
            border: 2px solid transparent;
            box-shadow: 0 4px 0 #cbd5e1;
        }
        
        .card:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0px rgba(0,0,0,0.15);
        }
        .card:active .btn {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #166534;
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            color: #94a3b8;
            font-size: 0.9rem;
            text-align: center;
            font-weight: bold;
        }

        .badge {
            position: absolute;
            top: 0;
            left: 0;
            background: #3b82f6;
            color: white;
            padding: 5px 15px;
            border-radius: 0 0 8px 0;
            font-weight: bold;
            font-size: 0.9rem;
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        
        .card:nth-child(2) .badge { background: #f59e0b; }
        .card:nth-child(3) .badge { background: #ec4899; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🟫 MC方块大陆：数学传送门</h1>
        <p>⚔️ 装备好你的红石大脑，准备开启史诗级任务！</p>
    </div>

    <div class="container">
        <div class="grid">
            <a href="01路程计算与基础相遇-mc.html" class="card">
                <div class="badge">LV.1</div>
                <div class="icon">🏃‍♂️</div>
                <div class="title">史蒂夫的村庄跑酷</div>
                <div class="desc">装备上皮革靴子，测量村庄坐标！掌握计算速度、方块路程和时间的基础配方，完成你的第一个红石挑战。</div>
                <div class="btn">✨ 开启传送门</div>
            </a>

            <a href="02“路程和”的动态变化-mc.html" class="card">
                <div class="badge">LV.2</div>
                <div class="icon">⚡</div>
                <div class="title">迅捷药水与僵尸追击</div>
                <div class="desc">危机降临！预测你们什么时候相距100个方块，甚至计算如何利用速度差，追上前方带着绿宝石的村民！</div>
                <div class="btn">✨ 开启传送门</div>
            </a>

            <a href="03折返跑问题-mc.html" class="card">
                <div class="badge">LV.3</div>
                <div class="icon">🐺</div>
                <div class="title">驯服无敌折返狼</div>
                <div class="desc">史诗成就解锁！带上你驯服的高速小狼，在两人之间疯狂折返跑。你能用最强大脑算出身法灵活的它跑了多少格吗？</div>
                <div class="btn">✨ 开启传送门</div>
            </a>
        </div>
    </div>

    <div class="footer">
        🎮 像素数学服务器 · 用红石点亮你的天赋
    </div>

</body>
</html>
