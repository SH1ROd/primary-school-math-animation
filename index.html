<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" style="background-color: #f8fafc; font-family: 'PingFang SC', sans-serif;">
  <style>
    .panel { fill: #ffffff; rx: 12; stroke: #e2e8f0; stroke-width: 2; }
    .track { stroke: #cbd5e1; stroke-width: 4; stroke-dasharray: 6 6; }
    .entity-label { font-size: 12px; font-weight: bold; fill: #fff; text-anchor: middle; pointer-events: none;}
    input { width: 100px; padding: 6px; font-size: 16px; border: 2px solid #3b82f6; border-radius: 6px; text-align: center; }
    button { padding: 8px 16px; font-size: 16px; font-weight: bold; color: white; background-color: #3b82f6; border: none; border-radius: 6px; cursor: pointer; }
    .flag { font-size: 24px; }
    .highlight { fill: #ef4444; font-weight: bold; }
  </style>

  <text x="400" y="40" font-size="22" font-weight="bold" fill="#1e293b" text-anchor="middle">🐕 逻辑同步实验：谁先完成谁喊停</text>
  <text x="400" y="70" font-size="14" fill="#64748b" text-anchor="middle">一旦狗跑完预测值 或 两人相遇，动画立即全部停止</text>

  <rect x="50" y="90" width="700" height="80" class="panel" stroke="#3b82f6" />
  <foreignObject x="180" y="110" width="440" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: center; gap: 15px;">
      <span style="font-weight: bold;">分配给狗：</span>
      <input type="number" id="predictInput" value="800" />
      <span style="font-weight: bold;">米</span>
      <button onclick="handleStart()">确认并开始</button>
    </div>
  </foreignObject>

  <rect x="50" y="190" width="700" height="200" fill="#f1f5f9" rx="12"/>
  <line x1="100" y1="310" x2="700" y2="310" class="track" />
  <g id="finish-flag" transform="translate(460, 260)" opacity="0.3">
    <text class="flag">🏁</text>
    <text y="65" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">正确相遇点</text>
  </g>

  <circle id="ming" cx="100" cy="310" r="22" fill="#3b82f6" opacity="0.7" />
  <text id="ming-t" x="100" y="315" class="entity-label">小明</text>
  <circle id="hong" cx="700" cy="310" r="22" fill="#ec4899" opacity="0.7" />
  <text id="hong-t" x="700" y="315" class="entity-label">小红</text>
  <g id="dog-box">
    <circle id="dog" cx="100" cy="275" r="16" fill="#f59e0b" stroke="#fff" stroke-width="2" />
    <text id="dog-t" x="100" y="280" class="entity-label" font-size="10">狗</text>
  </g>

  <rect x="50" y="410" width="700" height="150" class="panel" />
  <text id="v-time" x="150" y="500" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">0.0 分</text>
  <text x="150" y="460" font-size="14" fill="#64748b" text-anchor="middle">⏱️ 共同消耗时间</text>
  <text id="v-dog" x="400" y="500" font-size="32" font-weight="bold" fill="#f59e0b" text-anchor="middle">0.0 米</text>
  <text x="400" y="460" font-size="14" fill="#64748b" text-anchor="middle">🐕 狗跑的路程</text>
  <text id="v-gap" x="650" y="500" font-size="32" font-weight="bold" fill="#ef4444" text-anchor="middle">2000</text>
  <text x="650" y="460" font-size="14" fill="#64748b" text-anchor="middle">📏 两人剩余间距</text>

  <rect id="res-box" x="50" y="580" width="700" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" />
  <text id="res-text" x="400" y="625" font-size="18" font-weight="bold" text-anchor="middle" fill="#475569">输入预测值，看全员同步停止的情形</text>

  <script><![CDATA[
    let animId = null;
    let s = { time: 0, dDist: 0, pred: 0, dDir: 1, dX: 0, stop: false };
    const SCALE = 600 / 2000;

    function handleStart() {
      const val = parseFloat(document.getElementById('predictInput').value);
      if (isNaN(val) || val <= 0) return;
      if (animId) cancelAnimationFrame(animId);

      s = { time: 0, dDist: 0, pred: val, dDir: 1, dX: 0, stop: false };
      document.getElementById('res-text').textContent = "实验运行中...";
      document.getElementById('res-box').style.fill = "#f8fafc";
      
      tick();
    }

    function tick() {
      const dt = 0.05;
      
      // 核心停止逻辑：只要满足以下任一条件，全员立刻喊停
      const humansMet = s.time >= 20;
      const dogFinished = s.dDist >= s.pred;

      if (humansMet || dogFinished) {
        s.stop = true;
        render(); // 渲染最后一帧
        showFeedback(humansMet, dogFinished);
        return;
      }

      // 如果没停，所有人都继续动
      s.time += dt;
      let step = 80 * dt;
      if (s.dDist + step > s.pred) step = s.pred - s.dDist;
      s.dDist += step;

      // 狗的坐标
      s.dX += s.dDir * step;
      let mX = 60 * s.time;
      let hX = 2000 - (40 * s.time);
      if (s.dDir === 1 && s.dX >= hX) { s.dX = hX; s.dDir = -1; }
      else if (s.dDir === -1 && s.dX <= mX) { s.dX = mX; s.dDir = 1; }

      render();
      animId = requestAnimationFrame(tick);
    }

    function render() {
      const mR = 60 * s.time;
      const hR = 2000 - (40 * s.time);
      
      document.getElementById('ming').setAttribute('cx', 100 + mR * SCALE);
      document.getElementById('ming-t').setAttribute('x', 100 + mR * SCALE);
      document.getElementById('hong').setAttribute('cx', 100 + hR * SCALE);
      document.getElementById('hong-t').setAttribute('x', 100 + hR * SCALE);
      document.getElementById('dog').setAttribute('cx', 100 + s.dX * SCALE);
      document.getElementById('dog-t').setAttribute('x', 100 + s.dX * SCALE);

      document.getElementById('v-time').textContent = s.time.toFixed(1) + " 分";
      document.getElementById('v-dog').textContent = s.dDist.toFixed(1) + " 米";
      document.getElementById('v-gap').textContent = Math.max(0, hR - mR).toFixed(0) + " 米";
    }

    function showFeedback(hM, dF) {
      const resT = document.getElementById('res-text');
      const resB = document.getElementById('res-box');
      
      if (dF && !hM) {
        resT.textContent = "🛑 狗跑完了！但你看，主人们还没相遇，中间还差 " + document.getElementById('v-gap').textContent;
        resB.style.fill = "#fef2f2";
      } else if (hM && s.dDist < s.pred - 1) {
        resT.textContent = "🛑 主人相遇了！但狗还没跑完你给的任务，它没能准时到达。";
        resB.style.fill = "#fff7ed";
      } else {
        resT.textContent = "🎯 完美同步！狗跑完的一瞬间，主人也刚好握手！";
        resB.style.fill = "#f0fdf4";
      }
    }
  ]]></script>
</svg>
