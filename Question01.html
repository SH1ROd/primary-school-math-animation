<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 750" style="background-color: #f8fafc; font-family: 'PingFang SC', sans-serif;">
  <style>
    .btn { cursor: pointer; transition: 0.2s; }
    .btn:hover rect { fill: #1e88e5; }
    .panel { fill: #ffffff; rx: 12; stroke: #e2e8f0; stroke-width: 2; }
    .track { stroke: #cbd5e1; stroke-width: 4; stroke-dasharray: 6 6; }
    .entity-label { font-size: 12px; font-weight: bold; fill: #fff; text-anchor: middle; pointer-events: none;}
    input { width: 100px; padding: 6px; font-size: 16px; border: 2px solid #3b82f6; border-radius: 6px; text-align: center; }
    button { padding: 8px 16px; font-size: 16px; font-weight: bold; color: white; background-color: #3b82f6; border: none; border-radius: 6px; cursor: pointer; }
    .flag { font-size: 24px; }
  </style>

  <text x="400" y="40" font-size="22" font-weight="bold" fill="#1e293b" text-anchor="middle">🐕 逻辑实验室：精准停顿重置版</text>
  <text x="400" y="70" font-size="14" fill="#64748b" text-anchor="middle">明(60m/min) | 红(40m/min) | 狗(80m/min) | 全程2000m</text>

  <rect x="50" y="90" width="700" height="80" class="panel" stroke="#3b82f6" />
  <foreignObject x="180" y="110" width="440" height="50">
    <div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: center; gap: 15px;">
      <span style="font-weight: bold;">输入预测：</span>
      <input type="number" id="predictInput" value="1000" />
      <span style="font-weight: bold;">米</span>
      <button onclick="handleStart()">确认并开始</button>
    </div>
  </foreignObject>

  <rect x="50" y="190" width="700" height="200" fill="#f1f5f9" rx="12"/>
  <line x1="100" y1="310" x2="700" y2="310" class="track" />
  
  <g id="finish-flag" transform="translate(460, 260)" opacity="0.3">
    <text class="flag">🏁</text>
    <text y="65" font-size="12" fill="#ef4444" text-anchor="middle" font-weight="bold">真实相遇点</text>
  </g>

  <circle id="ming" cx="100" cy="310" r="22" fill="#3b82f6" opacity="0.7" />
  <text id="ming-t" x="100" y="315" class="entity-label">小明</text>

  <circle id="hong" cx="700" cy="310" r="22" fill="#ec4899" opacity="0.7" />
  <text id="hong-t" x="700" y="315" class="entity-label">小红</text>

  <g id="dog-box">
    <circle id="dog" cx="100" cy="275" r="16" fill="#f59e0b" stroke="#fff" stroke-width="2" />
    <text id="dog-t" x="100" y="280" class="entity-label" font-size="10">狗</text>
  </g>

  <rect x="50" y="410" width="700" height="150" class="panel" />
  <text id="v-time" x="150" y="500" font-size="32" font-weight="bold" fill="#0f172a" text-anchor="middle">0.0 分</text>
  <text x="150" y="460" font-size="14" fill="#64748b" text-anchor="middle">⏱️ 时间</text>

  <text id="v-dog" x="400" y="500" font-size="32" font-weight="bold" fill="#f59e0b" text-anchor="middle">0.0 米</text>
  <text x="400" y="460" font-size="14" fill="#64748b" text-anchor="middle">🐕 狗跑了</text>

  <text id="v-pred" x="650" y="500" font-size="32" font-weight="bold" fill="#3b82f6" text-anchor="middle">---</text>
  <text x="650" y="460" font-size="14" fill="#64748b" text-anchor="middle">🎯 预测</text>

  <rect id="res-box" x="50" y="580" width="700" height="80" rx="12" fill="#f8fafc" stroke="#e2e8f0" />
  <text id="res-text" x="400" y="625" font-size="18" font-weight="bold" text-anchor="middle" fill="#475569">正在等待输入...</text>

  <script><![CDATA[
    let animId = null;
    let state = {
      time: 0,
      dogDist: 0,
      predict: 0,
      dogDir: 1,
      dogX: 0,
      isDogStopped: false
    };

    const SCALE = 600 / 2000;
    const START_POS = 100;

    function handleStart() {
      const val = parseFloat(document.getElementById('predictInput').value);
      if (isNaN(val) || val <= 0) return;

      if (animId) cancelAnimationFrame(animId);

      // 初始化状态
      state = {
        time: 0,
        dogDist: 0,
        predict: val,
        dogDir: 1,
        dogX: 0,
        isDogStopped: false
      };

      document.getElementById('v-pred').textContent = val;
      document.getElementById('res-text').textContent = "演示中...";
      document.getElementById('res-box').style.fill = "#f8fafc";
      
      render();
      animId = requestAnimationFrame(animate);
    }

    function animate() {
      const dt = 0.05; 
      state.time += dt;

      const humansMet = state.time >= 20;

      // 狗的移动逻辑
      if (!state.isDogStopped) {
        let step = 80 * dt;
        
        // 检查是否越过预测值
        if (state.dogDist + step >= state.predict) {
            step = state.predict - state.dogDist;
            state.isDogStopped = true;
        }

        state.dogDist += step;

        // 计算物理坐标
        if (!humansMet) {
            state.dogX += state.dogDir * step;
            let mPos = 60 * state.time;
            let hPos = 2000 - (40 * state.time);
            
            // 撞墙折返
            if (state.dogDir === 1 && state.dogX >= hPos) {
                state.dogX = hPos;
                state.dogDir = -1;
            } else if (state.dogDir === -1 && state.dogX <= mPos) {
                state.dogX = mPos;
                state.dogDir = 1;
            }
        } else {
            // 人相遇后，如果狗没跑够，直线冲
            state.dogX += state.dogDir * step;
        }
      }

      render();

      if (humansMet && (state.isDogStopped || state.dogDist >= state.predict)) {
        cancelAnimationFrame(animId);
        showFeedback();
      } else {
        animId = requestAnimationFrame(animate);
      }
    }

    function render() {
      // 计算主人的位置（上限1200和800）
      const mReal = Math.min(60 * state.time, 1200);
      const hReal = 2000 - Math.min(40 * state.time, 800);

      const mSvgX = START_POS + mReal * SCALE;
      const hSvgX = START_POS + hReal * SCALE;
      const dSvgX = START_POS + state.dogX * SCALE;

      document.getElementById('ming').setAttribute('cx', mSvgX);
      document.getElementById('ming-t').setAttribute('x', mSvgX);
      document.getElementById('hong').setAttribute('cx', hSvgX);
      document.getElementById('hong-t').setAttribute('x', hSvgX);
      
      // 更新狗的视觉坐标
      document.getElementById('dog').setAttribute('cx', dSvgX);
      document.getElementById('dog-t').setAttribute('x', dSvgX);

      document.getElementById('v-time').textContent = state.time.toFixed(1) + " 分";
      document.getElementById('v-dog').textContent = state.dogDist.toFixed(1) + " 米";
    }

    function showFeedback() {
      const diff = state.predict - 1600;
      const resText = document.getElementById('res-text');
      const resBox = document.getElementById('res-box');

      if (Math.abs(diff) < 1) {
        resText.textContent = "🎯 预测完美！狗和主人准时准确汇合。";
        resBox.style.fill = "#f0fdf4";
      } else if (diff < 0) {
        resText.textContent = "❌ 算少了！你看狗停在了路中间，还没等到主人。";
        resBox.style.fill = "#fef2f2";
      } else {
        resText.textContent = "❌ 算多了！主人都握手了，狗还没停，冲过头了。";
        resBox.style.fill = "#fff7ed";
      }
    }
  ]]></script>
</svg>
